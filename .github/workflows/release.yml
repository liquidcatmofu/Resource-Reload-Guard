name: Release

on:
  push:
    tags:
      - '*.*.*-*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      minecraft_version: ${{ steps.version.outputs.minecraft_version }}
      mod_version: ${{ steps.version.outputs.mod_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      release_type: ${{ steps.version.outputs.release_type }}
      github_prerelease: ${{ steps.version.outputs.github_prerelease }}
      target_java_version: ${{ steps.version.outputs.target_java_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Read and validate versions
        id: version
        shell: bash
        run: |
          set -euo pipefail
          minecraft_version="$(sed -n 's/^minecraft_version *= *//p' gradle.properties | tr -d '\r')"
          mod_version="$(sed -n 's/^mod_version *= *//p' gradle.properties | tr -d '\r')"
          target_java_version="$(sed -n 's/^target_java_version *= *//p' gradle.properties | tr -d '\r')"
          release_version="${minecraft_version}-${mod_version}"

          if [[ ! "$mod_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "mod_version must be valid SemVer: $mod_version" >&2
            exit 1
          fi
          if [[ ! "$target_java_version" =~ ^[1-9][0-9]*$ ]]; then
            echo "target_java_version must be a positive integer: $target_java_version" >&2
            exit 1
          fi

          version_without_build="${mod_version%%+*}"
          if [[ "$version_without_build" == *-* ]]; then
            prerelease="${version_without_build#*-}"
            case "$prerelease" in
              alpha|alpha.*)
                release_type="alpha"
                ;;
              beta|beta.*|rc|rc.*)
                release_type="beta"
                ;;
              *)
                echo "Unsupported SemVer prerelease channel: $prerelease" >&2
                echo "Use alpha, beta, or rc; stable versions must not have a prerelease suffix." >&2
                exit 1
                ;;
            esac
            github_prerelease="true"
          else
            release_type="release"
            github_prerelease="false"
          fi

          if [[ "$GITHUB_REF_NAME" != "$release_version" ]]; then
            echo "Tag must be $release_version, but was $GITHUB_REF_NAME" >&2
            exit 1
          fi
          if ! grep -Fq "## [$mod_version]" CHANGELOG.md; then
            echo "CHANGELOG.md has no entry for $mod_version" >&2
            exit 1
          fi

          echo "minecraft_version=$minecraft_version" >> "$GITHUB_OUTPUT"
          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_type=$release_type" >> "$GITHUB_OUTPUT"
          echo "github_prerelease=$github_prerelease" >> "$GITHUB_OUTPUT"
          echo "target_java_version=$target_java_version" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: |
          chmod +x ./gradlew
          ./gradlew clean build --no-daemon --stacktrace

      - name: Prepare release files
        env:
          MINECRAFT_VERSION: ${{ steps.version.outputs.minecraft_version }}
          MOD_VERSION: ${{ steps.version.outputs.mod_version }}
          TARGET_JAVA_VERSION: ${{ steps.version.outputs.target_java_version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          fabric_jar="fabric/build/libs/ResourceReloadGuard-Fabric-${MINECRAFT_VERSION}-${MOD_VERSION}.jar"
          neoforge_jar="neoforge/build/libs/ResourceReloadGuard-NeoForge-${MINECRAFT_VERSION}-${MOD_VERSION}.jar"
          test -f "$fabric_jar"
          test -f "$neoforge_jar"
          cp "$fabric_jar" dist/
          cp "$neoforge_jar" dist/

          awk -v version="$MOD_VERSION" '
            index($0, "## [" version "]") == 1 { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > dist/release-notes.md
          if ! grep -q '[^[:space:]]' dist/release-notes.md; then
            echo "Release notes for $MOD_VERSION are empty" >&2
            exit 1
          fi

          unzip -p "dist/ResourceReloadGuard-Fabric-${MINECRAFT_VERSION}-${MOD_VERSION}.jar" fabric.mod.json \
            | jq -e --arg version "$MOD_VERSION" --arg minecraft "=$MINECRAFT_VERSION" --arg java ">=$TARGET_JAVA_VERSION" \
              '.version == $version and .environment == "client" and .depends.minecraft == $minecraft and .depends.java == $java' > /dev/null
          unzip -p "dist/ResourceReloadGuard-NeoForge-${MINECRAFT_VERSION}-${MOD_VERSION}.jar" META-INF/neoforge.mods.toml \
            | grep -Fq "version = \"$MOD_VERSION\""

          sha256sum dist/*.jar

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ steps.version.outputs.release_version }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  validate-publishing:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Verify publishing configuration
        env:
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for name in \
            MODRINTH_PROJECT_ID \
            MODRINTH_TOKEN \
            CURSEFORGE_PROJECT_ID \
            CURSEFORGE_TOKEN
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is not configured."
              exit 1
            fi
          done

  github-release:
    needs:
      - build
      - validate-publishing
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-${{ needs.build.outputs.release_version }}
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
          GITHUB_PRERELEASE: ${{ needs.build.outputs.github_prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          release_flags=(--prerelease="$GITHUB_PRERELEASE")
          if [[ "$GITHUB_PRERELEASE" == "true" ]]; then
            release_flags+=(--latest=false)
          fi

          if gh release view "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" dist/*.jar --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$RELEASE_VERSION" \
              --title "$RELEASE_VERSION" \
              --notes-file dist/release-notes.md \
              "${release_flags[@]}" \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_VERSION" dist/*.jar \
              --verify-tag \
              --title "$RELEASE_VERSION" \
              --notes-file dist/release-notes.md \
              "${release_flags[@]}" \
              --repo "$GITHUB_REPOSITORY"
          fi

  modrinth:
    needs:
      - build
      - validate-publishing
      - github-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - loader: fabric
            label: Fabric
            dependencies: fabric-api(required){modrinth:P7dR8mSH}{curseforge:306612}
          - loader: neoforge
            label: NeoForge
            dependencies: ''
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-${{ needs.build.outputs.release_version }}
          path: dist

      - name: Publish ${{ matrix.label }} to Modrinth
        uses: Kira-NT/mc-publish@v3.3.1
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: dist/ResourceReloadGuard-${{ matrix.label }}-${{ needs.build.outputs.minecraft_version }}-${{ needs.build.outputs.mod_version }}.jar
          name: ${{ matrix.label }}-${{ needs.build.outputs.minecraft_version }}-${{ needs.build.outputs.mod_version }}
          version: ${{ matrix.label }}-${{ needs.build.outputs.minecraft_version }}-${{ needs.build.outputs.mod_version }}
          version-type: ${{ needs.build.outputs.release_type }}
          changelog-file: dist/release-notes.md
          loaders: ${{ matrix.loader }}
          game-versions: ${{ needs.build.outputs.minecraft_version }}
          game-version-filter: none
          environment: client
          java: ${{ needs.build.outputs.target_java_version }}
          dependencies: ${{ matrix.dependencies }}
          retry-attempts: 2
          fail-mode: fail

  curseforge:
    needs:
      - build
      - validate-publishing
      - github-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - loader: fabric
            label: Fabric
            dependencies: fabric-api(required){modrinth:P7dR8mSH}{curseforge:306612}
          - loader: neoforge
            label: NeoForge
            dependencies: ''
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-${{ needs.build.outputs.release_version }}
          path: dist

      - name: Publish ${{ matrix.label }} to CurseForge
        uses: Kira-NT/mc-publish@v3.3.1
        with:
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: dist/ResourceReloadGuard-${{ matrix.label }}-${{ needs.build.outputs.minecraft_version }}-${{ needs.build.outputs.mod_version }}.jar
          name: ${{ matrix.label }}-${{ needs.build.outputs.minecraft_version }}-${{ needs.build.outputs.mod_version }}
          version: ${{ matrix.label }}-${{ needs.build.outputs.minecraft_version }}-${{ needs.build.outputs.mod_version }}
          version-type: ${{ needs.build.outputs.release_type }}
          changelog-file: dist/release-notes.md
          loaders: ${{ matrix.loader }}
          game-versions: ${{ needs.build.outputs.minecraft_version }}
          game-version-filter: none
          environment: client
          java: ${{ needs.build.outputs.target_java_version }}
          dependencies: ${{ matrix.dependencies }}
          retry-attempts: 2
          fail-mode: fail
